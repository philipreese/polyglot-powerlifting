name: FastAPI Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backends/fastapi/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backends/fastapi/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backends/fastapi

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "backends/fastapi/uv.lock"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Lint with Ruff
      run: uv run ruff check .

    - name: Test with pytest
      run: uv run pytest

on:
  push:
    branches:
      - main

name: release-please

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use the manifest approach for monorepo support
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Fix: Synchronize lockfiles when a release PR is created/updated
      - name: sync lockfiles
        if: ${{ steps.release.outputs.pr }}
        run: |
          git checkout ${{ fromJson(steps.release.outputs.pr).headBranchName }}
          
          # Setup Python/uv
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"
          
          # Sync Python lockfile
          cd backends/fastapi && uv lock && cd ../..
          
          # Sync Node lockfile
          corepack enable
          pnpm install --no-frozen-lockfile
          
          # Commit and push back to the PR
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add backends/fastapi/uv.lock pnpm-lock.yaml
          git commit -m "chore: synchronize lockfiles" || echo "No changes to commit"
          git push origin ${{ fromJson(steps.release.outputs.pr).headBranchName }}

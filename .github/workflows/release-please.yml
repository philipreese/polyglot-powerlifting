on:
  push:
    branches:
      - main

name: release-please

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use the manifest approach for monorepo support
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Fix: Synchronize lockfiles when a release PR is created/updated
      - name: sync lockfiles
        if: ${{ steps.release.outputs.pr }}
        run: |
          # Robust Branch Targeting
          PR_BRANCH=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.headBranchName')
          echo "Syncing lockfiles for branch: $PR_BRANCH"
          git checkout "$PR_BRANCH"
          
          # Setup Python/uv
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.cargo/bin:$PATH"
          
          # Sync Python lockfile
          echo "Running uv lock..."
          cd backends/fastapi && uv lock && cd ../..
          
          # Sync Node lockfile
          echo "Running pnpm install..."
          corepack enable
          pnpm install --no-frozen-lockfile
          
          # Commit and push back to the PR
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "chore: automated lockfile synchronization" || echo "No changes to commit"
          git push origin "$PR_BRANCH"

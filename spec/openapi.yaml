openapi: 3.1.0
info:
  title: Polyglot Powerlifting API
  version: 1.0.0
  description: API for calculating and storing powerlifting coefficients.

servers:
  - url: http://localhost:8000
    description: Local FastAPI Development Server

paths:
  /lifts:
    post:
      summary: Calculate and save lift coefficients
      description: >
        Accepts lift data in Kg, calculates all four scores (Wilks, DOTS, IPF GL, Reshel).
        If an authorization token is provided, the lift is saved to Supabase under the user's profile.
        Otherwise, only the calculated coefficients are returned.
      operationId: createLift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LiftRequest'
      responses:
        '200':
          description: Successfully calculated (and optionally saved) the lift.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiftResponse'
        '422':
          description: Validation Error

    get:
      summary: Get user lift history
      description: Returns a list of the logged-in user's previous lifts from Supabase.
      operationId: getLifts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of lifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LiftResponse'
        '401':
          description: Unauthorized

    delete:
      summary: Clear user history
      description: Deletes all lifts belonging to the authenticated user.
      operationId: clearLifts
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Successfully deleted all lifts.
        '401':
          description: Unauthorized

  /lifts/{id}:
    delete:
      summary: Delete a single lift
      description: Deletes a specific lift by UUID.
      operationId: deleteLift
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Successfully deleted the lift.
        '401':
          description: Unauthorized
        '404':
          description: Lift not found.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LiftRequest:
      type: object
      required:
        - bodyweight
        - gender
        - equipment
        - squat
        - bench
        - deadlift
      properties:
        bodyweight:
          type: number
          description: Bodyweight of the lifter in Kilograms (kg)
          minimum: 20
        gender:
          type: string
          enum: [male, female]
        equipment:
          type: string
          enum: [raw, single-ply, multi-ply]
        squat:
          type: number
          description: Heaviest successful squat attempt in Kilograms (kg)
          minimum: 0
        bench:
          type: number
          description: Heaviest successful bench attempt in Kilograms (kg)
          minimum: 0
        deadlift:
          type: number
          description: Heaviest successful deadlift attempt in Kilograms (kg)
          minimum: 0

    LiftResponse:
      type: object
      description: Mirrors the Supabase 'lifts' table schema.
      allOf:
        - $ref: '#/components/schemas/LiftRequest'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            user_id:
              type: string
              format: uuid
              nullable: true
              description: Null if anonymous
            created_at:
              type: string
              format: date-time
            total:
              type: number
              description: Calculated sum of squat + bench + deadlift
            wilks:
              type: number
              description: Calculated Wilks score
            dots:
              type: number
              description: Calculated DOTS score
            ipf_gl:
              type: number
              description: Calculated IPF GL score
            reshel:
              type: number
              description: Calculated Reshel score
